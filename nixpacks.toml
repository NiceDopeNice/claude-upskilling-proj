# v2 - config:cache moved to runtime startCommand for correct env var handling
[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.tokenizer",
  "php83Packages.composer"
]

[phases.build]
cmds = [
  "cd api && composer install --no-dev --optimize-autoloader",
  "cd api && php artisan route:cache"
]

[start]
cmd = "cd api && php artisan serve --host=0.0.0.0 --port=$PORT"
